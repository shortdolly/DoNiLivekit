<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小豆泥电竞</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <script src="./index.js"></script>
    <link rel="stylesheet" type="text/css" href="./index.css"/>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-title">📡 频道登录</div>
        <div class="input-group" id="login-section">
            <input type="text" id="server-ip" placeholder="服务器IP:端口，例如 10.126.126.10:5000">
            <input type="text" id="username" placeholder="请输入你的开黑昵称...">
            <button id="btn-connect" class="primary-btn" onclick="joinRoom()">进入大厅</button>
        </div>
        <div class="section-title-row">
            <div class="sidebar-title" style="margin: 0;">🔊 语音分组</div>
            <button class="tiny-btn" onclick="createChannel()" title="创建频道">+</button>
        </div>
        <div id="channel-list"></div>
        <div class="sidebar-title" style="margin-top: 10px;">👥 在线成员 (<span id="user-count">0</span>)</div>
        <div id="participant-list">
            <div style="font-size: 12px; color: #80848e; text-align: center; margin-top: 20px;">加入频道后显示在线人员</div>
        </div>
    </div>

    <div id="main-area">
        <div id="header"># 🎮 直播与共享大厅</div>
        <div id="video-container"></div>
        <div id="audio-container"></div>
        <div id="local-screen-preview-box">
            <div id="local-screen-preview-title">本地屏幕预览（静音）</div>
            <video id="local-screen-preview" muted autoplay playsinline></video>
        </div>

        <div id="controls-bar">
            <div class="mic-control-group">
                <select id="mic-select" onchange="switchMic(this.value)" disabled>
                    <option value="">等待权限...</option>
                </select>
                <select id="audio-output-select" onchange="switchAudioOutput(this.value)" disabled>
                    <option value="default">默认扬声器</option>
                </select>
                <button id="btn-mic" class="action-btn" onclick="toggleMic()" disabled>
                    🎤 <span>开启麦克风</span>
                </button>
                <button id="btn-noise" class="action-btn" onclick="toggleNoiseSuppression()" disabled>
                    🔊 <span>降噪: 开</span>
                </button>
            </div>

            <div class="mic-control-group">
                <select id="screen-res" disabled>
                    <option value="1280x720">720P</option>
                    <option value="1920x1080" selected>1080P</option>
                    <option value="2560x1440">2K</option>
                </select>
                <select id="screen-fps" disabled>
                    <option value="30">30 FPS</option>
                    <option value="60" selected>60 FPS</option>
                </select>
                <select id="screen-bitrate" disabled>
                    <option value="2500">2.5 Mbps (流畅)</option>
                    <option value="5000" selected>5.0 Mbps (高清)</option>
                    <option value="8000">8.0 Mbps (超清)</option>
                    <option value="15000">15.0 Mbps (原画)</option>
                    <option value="20000">20.0 Mbps (高码率)</option>
                    <option value="25000">25.0 Mbps (高码率+)</option>
                    <option value="30000">30.0 Mbps (极限)</option>
                </select>
                <button id="btn-screen" class="action-btn" onclick="toggleScreen()" disabled>
                    💻 <span>共享屏幕</span>
                </button>
            </div>

            <button id="btn-diagnose" class="action-btn" onclick="runAudioShareDiagnostics()">
                🧪 <span>一键排查音频</span>
            </button>
            <button id="btn-leave" class="action-btn" onclick="leaveRoom()" style="display: none;">
                🚪 <span>断开连接</span>
            </button>
        </div>
    </div>
    <div id="chat-panel">
        <div class="chat-header">💬 局域网聊天</div>
        <div id="chat-messages">
            <div style="font-size: 12px; color: #80848e; text-align: center; margin-top: 10px;">欢迎来到聊天室</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter') sendChatMessage()" disabled>
            <button id="btn-send" onclick="sendChatMessage()" disabled>发送</button>
        </div>
    </div>
</body>
</html>
